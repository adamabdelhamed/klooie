<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>klooie.blazor</title>
    <base href="/" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preload" id="webassembly" />
    <script>
        window.klooieBuildId = String(Date.now());
        document.write('<link rel="stylesheet" href="css/app.css?v=' + encodeURIComponent(window.klooieBuildId) + '" />');
    </script>
    <link href="klooie.blazor.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        window.klooieLifecycleOptions = {
            loadingHtmlPath: null,
            stoppedHtmlPath: null
        };
        window.klooieStorage = window.klooieStorage || {};
        window.klooieStorage.clearGameState = function () {
            try {
                for (let i = localStorage.length - 1; i >= 0; i--) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith("CLAWS:") || key.startsWith("klooie-"))) localStorage.removeItem(key);
                }
            } catch {
            }

            try {
                for (let i = sessionStorage.length - 1; i >= 0; i--) {
                    const key = sessionStorage.key(i);
                    if (key && (key.startsWith("CLAWS:") || key.startsWith("klooie-"))) sessionStorage.removeItem(key);
                }
            } catch {
            }

            try {
                for (const cookie of document.cookie.split(";")) {
                    const name = cookie.split("=")[0]?.trim();
                    if (!name || (name.startsWith("CLAWS") || name.startsWith("klooie")) === false) continue;
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/";
                }
            } catch {
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        document.write('<script src="klooieFramePump.js?v=' + encodeURIComponent(window.klooieBuildId) + '"><\/script>');
    </script>
    <script>
        if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
            navigator.serviceWorker.register("service-worker.js?v=" + encodeURIComponent(window.klooieBuildId)).catch(() => {});
        }
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
